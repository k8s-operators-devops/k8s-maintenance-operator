apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/component: controller
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: k8s-maintenance-operator
    app.kubernetes.io/version: v1.0.0
    control-plane: alb-maintenance
  name: alb-maintenance-metrics
  namespace: maintenance-operator
spec:
  ports:
  - name: https
    port: 8443
    protocol: TCP
    targetPort: 8443
  selector:
    app.kubernetes.io/name: k8s-maintenance-operator
    control-plane: alb-maintenance
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: controller
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: k8s-maintenance-operator
    app.kubernetes.io/version: v1.0.0
    control-plane: alb-maintenance
  name: alb-maintenance
  namespace: maintenance-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: k8s-maintenance-operator
      control-plane: alb-maintenance
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        app.kubernetes.io/component: controller
        app.kubernetes.io/name: k8s-maintenance-operator
        app.kubernetes.io/version: v1.0.0
        control-plane: alb-maintenance
    spec:
      containers:
      - args:
        - --metrics-bind-address=:8443
        - --leader-elect
        - --health-probe-bind-address=:8081
        command:
        - /manager
        env:
        - name: OPERATOR_VERSION
          value: v1.0.0
        image: ghcr.io/k8s-operators-devops/k8s-maintenance-operator:v1.0.0
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        ports:
        - containerPort: 8081
          name: health
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        volumeMounts: []
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: alb-maintenance
      terminationGracePeriodSeconds: 10
      volumes: []
