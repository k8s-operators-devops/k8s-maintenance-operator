apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: maintenances.k8smaintenance.io
spec:
  group: k8smaintenance.io
  names:
    kind: Maintenance
    listKind: MaintenanceList
    plural: maintenances
    singular: maintenance
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.targetIngress
      name: Ingress
      type: string
    - jsonPath: .spec.maintenanceMode
      name: Mode
      type: boolean
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Maintenance is the Schema for the maintenances API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: Desired state.
            properties:
              maintenanceMode:
                description: |-
                  MaintenanceMode is the master switch for maintenance behavior.
                  When false or omitted, maintenance is disabled and Schedule is ignored.
                  When true, maintenance starts immediately unless Schedule narrows the
                  active window.
                type: boolean
              priority:
                default: 0
                description: |-
                  Optional ALB group order for the maintenance ingress.
                  Lower values take precedence over higher values.
                minimum: 0
                type: integer
              response:
                description: Maintenance response configuration.
                properties:
                  backend:
                    default: fixed-response
                    description: |-
                      Backend implementation used to serve maintenance response.

                      fixed-response - Return HTML from ingress/load balancer.
                    enum:
                    - fixed-response
                    minLength: 1
                    type: string
                  html:
                    description: |-
                      HTML returned directly from the load balancer.
                      Used when Backend=fixed-response.

                      AWS ALB fixed-response has size limitations.
                    maxLength: 1024
                    type: string
                  serviceName:
                    description: |-
                      Existing Kubernetes Service name.
                      Used when Backend=service.
                    type: string
                  useNginx:
                    description: |-
                      Automatically deploy an NGINX backend
                      for larger maintenance pages.

                      Used when Backend=nginx.
                    type: boolean
                type: object
              schedule:
                description: |-
                  Optional maintenance schedule.
                  When set with MaintenanceMode=true, maintenance is enabled inside the
                  start/end window and disabled outside it.
                properties:
                  end:
                    description: Maintenance end time (RFC3339).
                    format: date-time
                    type: string
                  start:
                    description: Maintenance start time (RFC3339).
                    format: date-time
                    type: string
                type: object
              targetIngress:
                description: Name of the target Ingress.
                minLength: 1
                type: string
            required:
            - targetIngress
            type: object
          status:
            description: Observed state.
            properties:
              backupCreated:
                description: Whether a backup of the target Ingress exists.
                type: boolean
              backupResourceName:
                description: Name of the backup resource containing the original Ingress.
                type: string
              conditions:
                description: Current resource conditions.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              lastTransitionTime:
                description: Last time the controller changed the phase.
                format: date-time
                type: string
              message:
                description: Human-readable status message.
                type: string
              phase:
                description: |-
                  Current reconciliation phase.

                  Pending - Resource detected but not processed yet.
                  Enabled  - Maintenance rules applied successfully.
                  Disabled - Maintenance ingress removed.
                  Failed   - Reconciliation failed.
                enum:
                - Pending
                - Enabled
                - Disabled
                - Failed
                type: string
              targetIngressResourceVersion:
                description: |-
                  ResourceVersion of the target Ingress when maintenance was enabled.

                  Used to detect changes while maintenance mode is active.
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
