apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  labels:
    app.kubernetes.io/name: app-maintenance-operator
    app.kubernetes.io/component: controller
    app.kubernetes.io/version: v1.0.0
    app.kubernetes.io/managed-by: kustomize
  name: alb-maintenance-manager-role
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - k8smaintenance.io
  resources:
  - maintenances
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - k8smaintenance.io
  resources:
  - maintenances/finalizers
  verbs:
  - update
- apiGroups:
  - k8smaintenance.io
  resources:
  - maintenances/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - networking.k8s.io
  resources:
  - ingresses
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
