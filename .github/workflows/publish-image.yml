name: Publish Image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag to publish. Must point to the current protected main commit, for example v1.0.0"
        required: true
        default: "v1.0.0"

permissions:
  contents: read
  checks: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/k8s-operators-devops/app-maintenance-operator

jobs:
  publish:
    name: Build and push
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi
          case "$version" in
            v*) ;;
            *) echo "version must start with v, got: $version" >&2; exit 1 ;;
          esac
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Clone the code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          ref: ${{ steps.version.outputs.version }}
          fetch-depth: 0

      - name: Enforce protected release gate
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REQUIRED_CHECKS: Tests,Lint,Build
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          git fetch --force origin \
            "+refs/heads/main:refs/remotes/origin/main" \
            "+refs/tags/${VERSION}:refs/tags/${VERSION}"

          tag_commit="$(git rev-list -n 1 "${VERSION}")"
          main_commit="$(git rev-parse origin/main)"

          if [ "${tag_commit}" != "${main_commit}" ]; then
            echo "::error::Release tag ${VERSION} points to ${tag_commit}, but origin/main is ${main_commit}. Merge through the protected main branch and tag that validated commit."
            exit 1
          fi

          export TAG_COMMIT="${tag_commit}"
          python - <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.request

          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GH_TOKEN"]
          sha = os.environ["TAG_COMMIT"]
          required = [name.strip() for name in os.environ["REQUIRED_CHECKS"].split(",") if name.strip()]

          request = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/commits/{sha}/check-runs?per_page=100",
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {token}",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )

          try:
              with urllib.request.urlopen(request, timeout=30) as response:
                  payload = json.loads(response.read().decode("utf-8"))
          except urllib.error.HTTPError as exc:
              print(f"::error::Unable to read check runs for {sha}: HTTP {exc.code}", file=sys.stderr)
              sys.exit(1)

          runs = payload.get("check_runs", [])
          missing = []
          for check_name in required:
              successful_runs = [
                  run for run in runs
                  if run.get("name") == check_name
                  and run.get("status") == "completed"
                  and run.get("conclusion") == "success"
              ]
              if not successful_runs:
                  observed = [
                      f"{run.get('status')}/{run.get('conclusion')}"
                      for run in runs
                      if run.get("name") == check_name
                  ]
                  detail = ", ".join(observed) if observed else "not found"
                  missing.append(f"{check_name} ({detail})")

          if missing:
              print(
                  "::error::Release blocked. Required checks are not successful on "
                  f"{sha}: {', '.join(missing)}"
              )
              sys.exit(1)

          print(f"Release gate passed for {sha}: {', '.join(required)}")
          PY

      - name: Setup QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          platforms: arm64

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest,enable=${{ !contains(steps.version.outputs.version, '-') }}
          labels: |
            org.opencontainers.image.title=app-maintenance-operator
            org.opencontainers.image.description=Kubernetes operator for application maintenance mode overlays on AWS ALB IngressGroups

      - name: Build and push image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
