apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: k8s-maintenance-operator
  namespace: flux-system
spec:
  interval: 10m
  ref:
    tag: v0.1.3
  url: https://github.com/k8s-operators-devops/k8s-maintenance-operator.git
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: k8s-maintenance-operator
  namespace: flux-system
spec:
  interval: 10m
  path: ./deploy
  prune: true
  sourceRef:
    kind: GitRepository
    name: k8s-maintenance-operator
  targetNamespace: k8s-maintenance-operator-system
