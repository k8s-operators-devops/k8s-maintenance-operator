apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: k8s-maintenance-operator
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/k8s-operators-devops/k8s-maintenance-operator.git
    targetRevision: v0.1.0
    path: deploy
  destination:
    server: https://kubernetes.default.svc
    namespace: k8s-maintenance-operator-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

